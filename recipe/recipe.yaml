schema_version: 1

context:
  name: click-shell
  version: "2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: ce0c91faae284c41a39bec966f928791ad4a45763755445f1fe2041fd091aa37

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - click >=7.0
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - click_shell
      pip_check: false
      python_version: ${{ python_min }}
about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: An extension to click that easily turns your click app into a shell utility
  homepage: https://github.com/clarkperkins/click-shell
  repository: https://github.com/clarkperkins/click-shell
  documentation: https://click-shell.readthedocs.io/

extra:
  recipe-maintainers:
    - holgern
    - jan-janssen
